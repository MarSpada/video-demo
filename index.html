<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open WebUI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 12l2 2 4-4"/>
      </svg>
      Open WebUI
    </div>
    <button class="sidebar-toggle" id="sidebarCloseBtn" title="Close sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-actions">
    <button>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      New Chat
    </button>
  </div>

  <div class="sidebar-section-label">Today</div>
  <div class="sidebar-chats">
    <div class="chat-item active" id="currentChat">Social Media Image Creation</div>
    <div class="chat-item">Logo variations for Q2</div>
    <div class="chat-item">Social media banner</div>
  </div>

  <div class="sidebar-section-label">Yesterday</div>
  <div class="sidebar-chats">
    <div class="chat-item">Product mockup review</div>
    <div class="chat-item">Email header design</div>
  </div>

  <div class="sidebar-footer">
    <div class="user-avatar">N</div>
    <div class="user-name">Ned</div>
  </div>
</div>

<!-- Main Area -->
<div class="main">
  <!-- Navbar -->
  <div class="navbar">
    <button class="navbar-sidebar-toggle" id="sidebarOpenBtn" title="Open sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
    <div class="model-selector" id="modelSelector">
      <div class="model-icon"></div>
      <span id="modelName">Visual Bot</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-messages" id="chatMessages">
    <div class="landing" id="landing">
      <div class="landing-icon"></div>
      <div class="landing-greeting">Hello, Ned</div>
      <div class="landing-model">Visual Bot</div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-container">
      <textarea
        class="input-field"
        id="inputField"
        placeholder="Send a message"
        rows="1"
      ></textarea>
      <div class="input-buttons">
        <button class="btn-icon" title="Upload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
        <button class="btn-send" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="sendIcon">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="input-footer">Visual Bot can make mistakes. Check important info.</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
